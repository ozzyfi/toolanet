<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<script>
(function() {
  try {
    var stored = localStorage.getItem('toolA_lang');
    var nav = (navigator.language || 'en').toLowerCase();
    var lang = stored || (nav.indexOf('tr') === 0 ? 'tr' : 'en');
    document.documentElement.lang = lang;
  } catch (e) { document.documentElement.lang = 'en'; }
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, follow" />
<meta name="theme-color" content="#1e3a3a" />
<title data-tr="Sayfa bulunamadı — ToolA" data-en="Page not found — ToolA">Sayfa bulunamadı — ToolA</title>
<meta name="description" data-tr="Aradığınız sayfa bulunamadı. ToolA ana sayfasına dönebilirsiniz." data-en="The page you are looking for could not be found. You can return to the ToolA home page." content="Aradığınız sayfa bulunamadı. ToolA ana sayfasına dönebilirsiniz." />
<style>
  body { font-family: 'Outfit', system-ui, sans-serif; background: #fafaf7; color: #0f1a1a; -webkit-font-smoothing: antialiased; margin: 0; }
  .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { max-width: 480px; text-align: center; background: #fff; border: 1px solid #ece7dc; border-radius: 20px; padding: 48px 32px; box-shadow: 0 4px 24px rgba(30,58,58,.06); }
  .logo { width: 44px; height: 44px; border-radius: 10px; background: #1e3a3a; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  h1 { font-size: 28px; font-weight: 600; letter-spacing: -.02em; color: #0f1a1a; margin: 0 0 10px; }
  p { font-size: 17px; line-height: 1.6; color: #5a6a6a; margin: 0 0 28px; }
  a.btn { display: inline-block; padding: 12px 22px; background: #1e3a3a; color: #fff; text-decoration: none; border-radius: 10px; font-size: 15.5px; font-weight: 500; transition: background .2s; }
  a.btn:hover { background: #0f1f1d; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <h1 data-tr="Sayfa bulunamadı" data-en="Page not found">Sayfa bulunamadı</h1>
      <p data-tr="Aradığınız sayfa burada yok. ToolA ana sayfasına dönebilirsiniz." data-en="The page you are looking for is not here. You can return to the ToolA home page.">Aradığınız sayfa burada yok. ToolA ana sayfasına dönebilirsiniz.</p>
      <a href="/" class="btn" data-tr="Ana sayfaya dön →" data-en="Back to home →">Ana sayfaya dön →</a>
    </div>
  </div>
  <script>
    (function() {
      try {
        var stored = localStorage.getItem('toolA_lang');
        var nav = (navigator.language || 'en').toLowerCase();
        var lang = stored || (nav.indexOf('tr') === 0 ? 'tr' : 'en');
        var homeHref = lang === 'en' ? '/en' : '/';
        var btn = document.querySelector('a.btn');
        if (btn) btn.setAttribute('href', homeHref);
        document.querySelectorAll('[data-tr]').forEach(function(el) {
          var t = el.getAttribute('data-' + lang);
          if (t !== null) el.textContent = t;
        });
        var titleEl = document.querySelector('title');
        if (titleEl) {
          var t = titleEl.getAttribute('data-' + lang);
          if (t !== null) document.title = t;
        }
        var descEl = document.querySelector('meta[name="description"]');
        if (descEl) {
          var t = descEl.getAttribute('data-' + lang);
          if (t !== null) descEl.setAttribute('content', t);
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
