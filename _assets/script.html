<script>

(function() {
  try {
    var stored = localStorage.getItem('toolA_lang');
    var path = window.location.pathname;
    var isEnPath = (path === '/en' || path.indexOf('/en') === 0);
    var isTrPath = !isEnPath;

    if (stored === 'tr' && isEnPath) { window.location.replace('/'); return; }
    if (stored === 'en' && isTrPath) { window.location.replace('/en'); return; }
    if (stored) return;

    var nav = (navigator.language || 'en').toLowerCase();
    if (nav.indexOf('tr') === 0 && isEnPath) { window.location.replace('/'); return; }
    if (nav.indexOf('tr') !== 0 && isTrPath) { window.location.replace('/en'); return; }

    fetch('https://api.country.is/')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.country === 'TR' && isEnPath) { localStorage.setItem('toolA_lang','tr'); window.location.replace('/'); }
        else if (d.country !== 'TR' && isTrPath) { localStorage.setItem('toolA_lang','en'); window.location.replace('/en'); }
      })
      .catch(function() {});
  } catch (e) {}
})();



  function setLang(lang) {
    try { localStorage.setItem('toolA_lang', lang); } catch (e) {}
    window.location.href = (lang === 'tr') ? '/' : '/en';
  }

  (function() {
    // Pilot modal
    var modal = document.getElementById('pilotModal');
    var overlay = document.getElementById('pilotModalOverlay');
    var closeBtn = document.getElementById('pilotModalClose');
    var form = document.getElementById('pilotForm');
    var success = document.getElementById('pilotSuccess');
    var successClose = document.getElementById('pilotSuccessClose');
    var triggers = document.querySelectorAll('[data-pilot-trigger]');

    function openModal() {
      if (!modal) return;
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      if (form) {
        form.classList.remove('hidden');
        try { form.reset(); } catch(e) {}
      }
      if (success) success.classList.add('hidden');
      setTimeout(function() {
        var f = document.getElementById('pilotName');
        if (f) f.focus();
      }, 50);
    }
    function closeModal() {
      if (!modal) return;
      modal.classList.add('hidden');
      document.body.style.overflow = '';
    }

    triggers.forEach(function(t) {
      t.addEventListener('click', function(e) {
        e.preventDefault();
        openModal();
      });
    });
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    if (overlay) overlay.addEventListener('click', closeModal);
    if (successClose) successClose.addEventListener('click', closeModal);

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modal && !modal.classList.contains('hidden')) closeModal();
    });

    // Form submit
    if (form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var formError = document.getElementById('pilotFormError');
        var submitBtn = document.getElementById('pilotSubmitBtn');
        var btnLabel = submitBtn ? submitBtn.querySelector('.btn-label') : null;
        var originalLabel = btnLabel ? btnLabel.textContent : '';
        var loadingLabel = btnLabel ? (btnLabel.getAttribute('data-loading') || 'Gönderiliyor…') : '';

        if (formError) { formError.classList.add('hidden'); formError.textContent = ''; }
        if (submitBtn) submitBtn.disabled = true;
        if (btnLabel) btnLabel.textContent = loadingLabel;

        var data = new FormData(form);
        fetch(form.action || 'https://formspree.io/f/xkoaoopq', {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        }).then(function(resp) {
          if (resp.ok) {
            if (form) form.classList.add('hidden');
            if (success) success.classList.remove('hidden');
            if (submitBtn) submitBtn.disabled = false;
            if (btnLabel) btnLabel.textContent = originalLabel;
          } else {
            resp.json().then(function(d) {
              if (formError) {
                var msg = (d && d.errors) ? d.errors.map(function(e){return e.message;}).join(', ') : 'Gönderilirken bir sorun oluştu. Lütfen tekrar deneyin.';
                formError.textContent = msg;
                formError.classList.remove('hidden');
              }
              if (submitBtn) submitBtn.disabled = false;
              if (btnLabel) btnLabel.textContent = originalLabel;
            }).catch(function() {
              if (formError) {
                formError.textContent = 'Gönderilirken bir sorun oluştu. Lütfen tekrar deneyin.';
                formError.classList.remove('hidden');
              }
              if (submitBtn) submitBtn.disabled = false;
              if (btnLabel) btnLabel.textContent = originalLabel;
            });
          }
        }).catch(function(err) {
          if (formError) {
            formError.textContent = 'Gönderilirken bir sorun oluştu. Lütfen tekrar deneyin.';
            formError.classList.remove('hidden');
          }
          if (submitBtn) submitBtn.disabled = false;
          if (btnLabel) btnLabel.textContent = originalLabel;
          console.error('Form submission error:', err);
        });
      });
    }

    // Mobile menu toggle
    var mobileBtn = document.getElementById('mobileMenuBtn');
    var mobileMenu = document.getElementById('mobileMenu');
    var mobileLinks = document.querySelectorAll('.mobile-link');
    if (mobileBtn && mobileMenu) {
      var hamburgerIcon = document.getElementById('hamburgerIcon');
      var closeIcon = document.getElementById('closeIcon');
      mobileBtn.addEventListener('click', function() {
        var isOpen = !mobileMenu.classList.contains('hidden');
        mobileMenu.classList.toggle('hidden');
        var nowOpen = !isOpen;
        mobileBtn.setAttribute('aria-expanded', nowOpen ? 'true' : 'false');
        mobileMenu.setAttribute('aria-hidden', nowOpen ? 'false' : 'true');
        if (hamburgerIcon) hamburgerIcon.classList.toggle('hidden', nowOpen);
        if (closeIcon) closeIcon.classList.toggle('hidden', !nowOpen);
        document.body.style.overflow = nowOpen ? 'hidden' : '';
      });
      mobileLinks.forEach(function(link) {
        link.addEventListener('click', function() {
          mobileMenu.classList.add('hidden');
          mobileBtn.setAttribute('aria-expanded', 'false');
          mobileMenu.setAttribute('aria-hidden', 'true');
          if (hamburgerIcon) hamburgerIcon.classList.remove('hidden');
          if (closeIcon) closeIcon.classList.add('hidden');
          document.body.style.overflow = '';
        });
      });
    }
  })();


</script>
