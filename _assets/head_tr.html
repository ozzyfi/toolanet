<head>
<meta charset="UTF-8" />
<script>
(function() {
  try {
    var stored = localStorage.getItem('toolA_lang');
    var path = window.location.pathname;
    var isEnPath = (path === '/en' || path.indexOf('/en') === 0);
    var isTrPath = !isEnPath;

    // 1) Manuel secim oncelikli — aninda yonlendir
    if (stored === 'tr' && isEnPath) { window.location.replace('/'); return; }
    if (stored === 'en' && isTrPath) { window.location.replace('/en'); return; }
    if (stored) return; // Manuel secim var, baska kontrol yapma

    // 2) localStorage bossa — browser language senkron fallback
    var nav = (navigator.language || 'en').toLowerCase();
    if (nav.indexOf('tr') === 0 && isEnPath) { window.location.replace('/'); return; }
    if (nav.indexOf('tr') !== 0 && isTrPath) { window.location.replace('/en'); return; }

    // 3) Arka plan: IP ulke tespiti — browser language ile uyusmazsa duzelt
    fetch('https://api.country.is/')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d || !d.country) return;
        if (d.country === 'TR' && isEnPath) {
          try { localStorage.setItem('toolA_lang', 'tr'); } catch (e) {}
          window.location.replace('/');
        } else if (d.country !== 'TR' && isTrPath) {
          try { localStorage.setItem('toolA_lang', 'en'); } catch (e) {}
          window.location.replace('/en');
        }
      })
      .catch(function() {});
  } catch (e) {}
})();
</script>
