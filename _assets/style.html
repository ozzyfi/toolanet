<style>
  .skip-link {
    position: absolute; left: -9999px; top: 0; z-index: 100;
    padding: 10px 16px; background: #1e3a3a; color: #fff;
    font-size: 15px; border-radius: 0 0 8px 0;
  }
  .skip-link:focus { left: 0; outline: 2px solid #c2703a; outline-offset: -2px; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Outfit', system-ui, sans-serif; background: #fafaf7; color: #0f1a1a; -webkit-font-smoothing: antialiased; }

  .grain {
    background-image:
      radial-gradient(circle at 12% 8%, rgba(194,112,58,0.05), transparent 35%),
      radial-gradient(circle at 88% 92%, rgba(30,58,58,0.06), transparent 40%);
  }

  .grid-bg {
    background-image:
      linear-gradient(rgba(15,26,26,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,26,26,0.04) 1px, transparent 1px);
    background-size: 56px 56px;
  }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 22px; border-radius: 10px;
    background: #1e3a3a; color: #fff; font-weight: 500; font-size: 14.5px;
    transition: all .2s ease;
  }
  .btn-primary:hover { background: #0f1f1d; transform: translateY(-1px); }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 18px; border-radius: 10px;
    color: #1e3a3a; font-weight: 500; font-size: 14.5px;
    transition: all .2s ease;
  }
  .btn-ghost:hover { background: #f0f4f3; }

  .card {
    background: #fff;
    border: 1px solid #ece7dc;
    border-radius: 18px;
    padding: 26px;
    transition: all .25s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(15,26,26,0.05), 0 12px 32px -8px rgba(15,26,26,0.08); }

  .icon-box {
    width: 44px; height: 44px; border-radius: 11px;
    background: #f0f4f3; color: #1e3a3a;
    display: inline-flex; align-items: center; justify-content: center;
  }

  .step-card {
    background: #fff; border: 1px solid #ece7dc; border-radius: 16px;
    padding: 22px; position: relative;
  }
  .step-num {
    position: absolute; top: -12px; left: 18px;
    background: #1e3a3a; color: #fff;
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    padding: 4px 10px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
  }

  .work-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: #5a6a6a;
    font-family: 'JetBrains Mono', monospace;
  }

  .pilot-metric {
    display: flex; align-items: baseline; gap: 12px;
    padding: 18px 0;
    border-top: 1px solid #ece7dc;
  }
  .pilot-metric:last-child { border-bottom: 1px solid #ece7dc; }
  .pilot-metric .v { font-size: 36px; font-weight: 600; color: inherit; letter-spacing: -0.02em; }
  .pilot-metric .l { font-size: 14px; color: inherit; opacity: 0.7; }

  .data-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px dashed #ece7dc;
  }
  .data-row:last-child { border-bottom: none; }

  .bar-track { height: 6px; background: #f0f4f3; border-radius: 4px; overflow: hidden; }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #1e3a3a, #2f5a52);
    border-radius: 4px;
    transform-origin: left center;
    animation: fillUp 1s ease-out both;
  }
  @keyframes fillUp {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .bar-fill { animation: none; }
  }

  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #c2703a;
    position: relative;
  }
  .pulse-dot::after {
    content: ""; position: absolute; inset: -4px; border-radius: 50%;
    border: 1px solid #c2703a; animation: pulse 2s infinite;
  }
  .pulse-dot-forest {
    width: 8px; height: 8px; border-radius: 50%; background: #1e3a3a;
    position: relative;
  }
  .pulse-dot-forest::after {
    content: ""; position: absolute; inset: -4px; border-radius: 50%;
    border: 1px solid #1e3a3a; animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  .gradient-text {
    background: linear-gradient(135deg, #1e3a3a 0%, #2f5a52 60%, #c2703a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  @media (max-width: 768px) {
    .step-grid { grid-template-columns: 1fr !important; }
    .pilot-grid { grid-template-columns: 1fr !important; }
  }
</style>
